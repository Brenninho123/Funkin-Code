<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Funkin Code - FNF Modding Studio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/theme/dracula.min.css">
    <style>
        :root {
            --bg-color: #0e0e13;
            --sidebar-color: #15151f;
            --tab-bar-color: #1a1a26;
            --accent-color: #ff007f;
            --accent-glow: #00ffff;
            --text-color: #f0f0f5;
            --terminal-color: #050508;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        header {
            background-color: var(--sidebar-color);
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--accent-color);
            box-shadow: 0 0 10px rgba(255, 0, 127, 0.3);
            z-index: 10;
        }

        .logo {
            font-weight: 900;
            font-size: 1.3rem;
            color: var(--accent-color);
            text-shadow: 2px 2px 0px var(--accent-glow);
            letter-spacing: 1px;
        }

        .actions button {
            background-color: #252538;
            color: white;
            border: 1px solid #3d3d5c;
            padding: 8px 16px;
            margin-left: 8px;
            cursor: pointer;
            border-radius: 6px;
            font-weight: bold;
            transition: all 0.2s ease;
        }

        .actions button:hover {
            background-color: var(--accent-color);
            border-color: var(--accent-color);
            box-shadow: 0 0 8px var(--accent-color);
            transform: translateY(-1px);
        }

        .main-container {
            display: flex;
            flex: 1;
            height: calc(100vh - 170px);
        }

        sidebar {
            width: 240px;
            background-color: var(--sidebar-color);
            border-right: 1px solid #252538;
            padding: 20px 12px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        sidebar h3 {
            font-size: 0.8rem;
            text-transform: uppercase;
            color: #6272a4;
            letter-spacing: 1px;
            padding-left: 5px;
        }

        .file-list {
            list-style: none;
        }

        .file-item {
            padding: 10px 12px;
            cursor: pointer;
            border-radius: 6px;
            font-size: 0.9rem;
            margin-bottom: 6px;
            transition: all 0.15s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .file-item:hover {
            background-color: #222233;
            color: var(--accent-glow);
        }

        .workspace-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-color: #282a36;
        }

        /* Sistema de Abas (Tabs) */
        .tabs-bar {
            background-color: var(--tab-bar-color);
            display: flex;
            border-bottom: 1px solid #252538;
            height: 35px;
        }

        .tab {
            padding: 0 16px;
            display: flex;
            align-items: center;
            background-color: #12121a;
            color: #7d7d9d;
            font-size: 0.85rem;
            cursor: pointer;
            border-right: 1px solid #1a1a26;
            height: 100%;
            transition: all 0.2s;
        }

        .tab:hover {
            background-color: #181824;
            color: white;
        }

        .tab.active {
            background-color: #282a36;
            color: var(--text-color);
            border-top: 2px solid var(--accent-color);
            font-weight: 600;
        }

        .editor-container {
            flex: 1;
            position: relative;
        }

        .CodeMirror {
            position: absolute;
            top: 0; bottom: 0; left: 0; right: 0;
            height: 100% !important;
            font-family: 'Fira Code', 'Courier New', monospace;
            font-size: 14px;
        }

        .terminal-panel {
            height: 120px;
            background-color: var(--terminal-color);
            border-top: 2px solid #252538;
            display: flex;
            flex-direction: column;
        }

        .terminal-header {
            background-color: #09090d;
            padding: 4px 12px;
            font-size: 0.75rem;
            text-transform: uppercase;
            color: #6272a4;
            font-weight: bold;
            border-bottom: 1px solid #15151f;
        }

        .terminal-body {
            flex: 1;
            padding: 10px 15px;
            font-family: 'Consolas', monospace;
            font-size: 0.85rem;
            color: #50fa7b;
            overflow-y: auto;
            white-space: pre-wrap;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #15151f; }
        ::-webkit-scrollbar-thumb { background: #2d2d3f; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent-color); }
    </style>
</head>
<body>

    <header>
        <div class="logo">🎤 FUNKIN CODE</div>
        <div class="actions">
            <button onclick="saveCurrentFile()">💾 Save File</button>
            <button onclick="runModProject()" style="color: var(--accent-glow);">▶100 Run Mod (Lime)</button>
        </div>
    </header>

    <div class="main-container">
        <sidebar>
            <h3>Project Files</h3>
            <ul class="file-list">
                <li class="file-item" onclick="openFile('PlayState.hx')">🧡 PlayState.hx</li>
                <li class="file-item" onclick="openFile('custom_events.lua')">💙 custom_events.lua</li>
                <li class="file-item" onclick="openFile('Project.xml')">⚙️ Project.xml</li>
            </ul>
        </sidebar>

        <div class="workspace-container">
            <div class="tabs-bar" id="tabs-container"></div>
            <div class="editor-container">
                <textarea id="code-editor"></textarea>
            </div>
        </div>
    </div>

    <div class="terminal-panel">
        <div class="terminal-header">Console Output</div>
        <div class="terminal-body" id="output-log">[System] Funkin Code Engine v0.1 ready. Pipeline waiting...</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/haxe/haxe.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/lua/lua.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/xml/xml.min.js"></script>

    <script>
        // Banco de dados em memória simulando arquivos abertos
        const fileVirtualFS = {
            "PlayState.hx": "class PlayState extends MusicBeatState \n{\n    override function create() \n    {\n        super.create();\n        trace('Funkin Code: PlayState Loaded!');\n    }\n}",
            "custom_events.lua": "function onCreate()\n    -- Triggered when the script initializes\n    trace('Lua event framework initialized');\nend",
            "Project.xml": "<?xml version=\"1.0\" encoding=\"utf-8\"?>\n<project>\n    <meta title=\"Funkin Code Target Mod\" package=\"com.funkincode.mod\" />\n</project>"
        };

        let activeFile = "PlayState.hx";
        let openTabs = ["PlayState.hx", "custom_events.lua", "Project.xml"];

        const editor = CodeMirror.fromTextArea(document.getElementById("code-editor"), {
            lineNumbers: true,
            theme: "dracula",
            mode: "haxe",
            indentUnit: 4,
            smartIndent: true
        });

        function renderTabs() {
            const container = document.getElementById("tabs-container");
            container.innerHTML = "";
            openTabs.forEach(file => {
                const tab = document.createElement("div");
                tab.className = `tab ${file === activeFile ? 'active' : ''}`;
                tab.innerText = file;
                tab.onclick = () => switchTab(file);
                container.appendChild(tab);
            });
        }

        function switchTab(fileName) {
            // Salva o estado atual da aba anterior antes de mudar
            fileVirtualFS[activeFile] = editor.getValue();
            
            activeFile = fileName;
            renderTabs();

            // Configura a sintaxe correta
            if (fileName.endsWith('.lua')) editor.setOption("mode", "lua");
            else if (fileName.endsWith('.hx')) editor.setOption("mode", "haxe");
            else if (fileName.endsWith('.xml')) editor.setOption("mode", "xml");

            editor.setValue(fileVirtualFS[fileName]);
            logToTerminal("Switched focus to: " + fileName);
        }

        function openFile(fileName) {
            if (!openTabs.includes(fileName)) {
                openTabs.push(fileName);
            }
            switchTab(fileName);
        }

        function logToTerminal(message) {
            const consoleBody = document.getElementById("output-log");
            consoleBody.innerHTML += "\n> " + message;
            consoleBody.scrollTop = consoleBody.scrollHeight;
        }

        function pipeToCpp(action, payload) {
            if (window.chrome && window.chrome.webview) {
                window.chrome.webview.postMessage(JSON.stringify({ action: action, data: payload }));
            } else {
                logToTerminal(`[Local Dev Mode] Outbound Trigger -> Action: "${action}"`);
            }
        }

        function saveCurrentFile() {
            fileVirtualFS[activeFile] = editor.getValue();
            logToTerminal(`Saving process initialized for: ${activeFile}`);
            pipeToCpp("save_file", {
                filename: activeFile,
                content: fileVirtualFS[activeFile]
            });
        }

        function runModProject() {
            logToTerminal("Compiling build package target...");
            pipeToCpp("compile_project", { command: "lime test windows" });
        }

        // Inicializa a UI carregando o primeiro arquivo
        editor.setValue(fileVirtualFS[activeFile]);
        renderTabs();

        // Listener para retornos assíncronos vindos do C++
        if (window.chrome && window.chrome.webview) {
            window.chrome.webview.addEventListener('message', event => {
                try {
                    const response = JSON.parse(event.data);
                    if (response.log) logToTerminal(`[System Core] ${response.log}`);
                } catch(e) {
                    logToTerminal(`[Raw Core Signal] ${event.data}`);
                }
            });
        }
    </script>
</body>
</html>
